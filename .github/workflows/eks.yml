name: EKS Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'eks/**'
  pull_request:
    branches:
      - main
    paths:
      - 'eks/**'
  workflow_dispatch:

jobs:
  # ── STAGING ────────────────────────────────────────────────────────────────

  staging-cluster:
    name: Staging - 1. EKS Cluster
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
      - run: terraform init
        working-directory: eks/cluster
      - run: terraform validate
        working-directory: eks/cluster
      - run: terraform import aws_iam_role.eks_cluster_role eks-group-one-cluster-role || true
        working-directory: eks/cluster
      - run: terraform apply -auto-approve -var="environment=staging" -var="cluster_name=eks-group-one-staging"
        working-directory: eks/cluster

  staging-addons:
    name: Staging - 2. EKS Addons
    runs-on: ubuntu-latest
    environment: staging
    needs: staging-cluster

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
      - run: terraform init
        working-directory: eks/addons
      - run: terraform validate
        working-directory: eks/addons
      - run: terraform apply -auto-approve -var="environment=staging" -var="cluster_name=eks-group-one-staging"
        working-directory: eks/addons

  staging-nodegroup:
    name: Staging - 3. EKS Node Group
    runs-on: ubuntu-latest
    environment: staging
    needs: staging-cluster

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
      - run: terraform init
        working-directory: eks/nodegroup
      - run: terraform validate
        working-directory: eks/nodegroup
      - run: terraform import aws_iam_role.eks_node_role eks-group-one-node-role || true
        working-directory: eks/nodegroup
      - run: terraform apply -auto-approve -var="environment=staging" -var="cluster_name=eks-group-one-staging" -var="node_group_name=eks-group-one-staging-nodegroup"
        working-directory: eks/nodegroup

  # ── PRODUCTION ─────────────────────────────────────────────────────────────

  production-cluster:
    name: Production - 1. EKS Cluster
    runs-on: ubuntu-latest
    environment: production
    needs: [staging-addons, staging-nodegroup]

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
      - run: terraform init
        working-directory: eks/cluster
      - run: terraform validate
        working-directory: eks/cluster
      - run: terraform import aws_iam_role.eks_cluster_role eks-group-one-cluster-role || true
        working-directory: eks/cluster
      - run: terraform apply -auto-approve -var="environment=production" -var="cluster_name=eks-group-one-prod"
        working-directory: eks/cluster

  production-addons:
    name: Production - 2. EKS Addons
    runs-on: ubuntu-latest
    environment: production
    needs: production-cluster

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
      - run: terraform init
        working-directory: eks/addons
      - run: terraform validate
        working-directory: eks/addons
      - run: terraform apply -auto-approve -var="environment=production" -var="cluster_name=eks-group-one-prod"
        working-directory: eks/addons

  production-nodegroup:
    name: Production - 3. EKS Node Group
    runs-on: ubuntu-latest
    environment: production
    needs: production-cluster

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
      - run: terraform init
        working-directory: eks/nodegroup
      - run: terraform validate
        working-directory: eks/nodegroup
      - run: terraform import aws_iam_role.eks_node_role eks-group-one-node-role || true
        working-directory: eks/nodegroup
      - run: terraform apply -auto-approve -var="environment=production" -var="cluster_name=eks-group-one-prod" -var="node_group_name=eks-group-one-prod-nodegroup"
        working-directory: eks/nodegroup
